name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid duplicate runs when a branch already has an open PR: the
# pull_request workflow covers it.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Vite+ release gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install
        run: vp install

      - name: Doctor
        run: vp run doctor

      - name: Release gate
        run: vp run verify:release
