name: Bug report
description: Report a reproducible problem in Scaffold
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, learner records, or production LMS data.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Provide the Scaffold version or commit SHA.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include the host platform, version, OS, and browser where relevant.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Give the smallest steps or repository needed to reproduce the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove secrets and personal data before posting.
