<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="scaffold mark">
  <title>scaffold mark — single-colour black</title>
  <!-- Monochrome black for stamps, embossing, single-ink print. No
       opacity — hierarchy comes from stroke weight (plus 4.25 vs
       corners 2). -->
  <path d="M5 24V5h19M40 5h19v19M59 40v19H40M24 59H5V40" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 3"/>
  <path d="M32 18v28M18 32h28" fill="none" stroke="#000000" stroke-width="4.25" stroke-linecap="round"/>
</svg>
