<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="scaffold">
  <title>scaffold</title>
  <!-- Small-size variant for sub-22px contexts. Solid corners (no
       dashes) so they survive where dashes would blur; plus stays the
       bold figure. Adaptive: navy on light UI, white on dark UI. -->
  <style>
    .sc-mark { stroke: #161D77; }
    @media (prefers-color-scheme: dark) {
      .sc-mark { stroke: #FFFFFF; }
    }
  </style>
  <path class="sc-mark" d="M5 24V5h19M40 5h19v19M59 40v19H40M24 59H5V40" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="sc-mark" d="M32 18v28M18 32h28" fill="none" stroke-width="4.5" stroke-linecap="round"/>
</svg>
